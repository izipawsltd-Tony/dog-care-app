<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100" role="img">
  <title>iziPaws — Breeder Operations</title>
  <desc>iziPaws logo: paw icon with iZi letters on navy background, teal and white wordmark</desc>

  <!-- Background pill -->
  <rect x="0" y="0" width="420" height="100" rx="12" fill="#0C3B6E"/>

  <!-- Paw icon group -->
  <!-- 4 toes -->
  <ellipse cx="38" cy="28" rx="10" ry="7.5" fill="#1D9E75"/>
  <ellipse cx="56" cy="20" rx="10" ry="7.5" fill="#1D9E75"/>
  <ellipse cx="75" cy="20" rx="10" ry="7.5" fill="#1D9E75"/>
  <ellipse cx="93" cy="28" rx="10" ry="7.5" fill="#1D9E75"/>
  <!-- Main pad -->
  <ellipse cx="65" cy="52" rx="22" ry="17" fill="#1D9E75"/>
  <!-- iZi text inside pad -->
  <text x="44" y="61" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0C3B6E" letter-spacing="-0.5">iZi</text>

  <!-- Wordmark -->
  <text x="118" y="62" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="white">izi</text>
  <text x="183" y="62" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#1D9E75">P</text>
  <text x="206" y="62" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="white">aws</text>

  <!-- Tagline -->
  <text x="118" y="80" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#5DCAA5" letter-spacing="2.5">BREEDER OPERATIONS</text>
</svg>
